name: tests

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js latest
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
      - name: Install dependencies
        run: npm install
      - name: Run the tests
        run: npm test
        env:
          CI: true
          B2_ID: ${{ secrets.B2_ID }}
          B2_KEY: ${{ secrets.B2_KEY }}
